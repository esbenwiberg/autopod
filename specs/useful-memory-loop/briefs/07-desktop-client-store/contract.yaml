contract_version: 1
title: "Mirror memory APIs in desktop client"
depends_on:
  - 06-add-memory-apis-analytics
scenarios:
  - id: swift-decodes-memory-contracts
    given:
      - "the daemon returns legacy memories, extended memories, candidates, usage history, and memory analytics JSON"
    when:
      - "the desktop client decodes the responses"
    then:
      - "legacy memories remain decodable"
      - "new candidate, evidence, usage, and analytics fields are available to the UI"
  - id: memory-store-loads-workbench-state
    given:
      - "the daemon API exposes candidates, active memories, detail evidence, and analytics"
    when:
      - "MemoryStore loads memory state and receives candidate events"
    then:
      - "pending candidates, active memories, selected details, usage history, and analytics are stored separately"
      - "candidate events update the store without dropping existing memory entries"
required_facts: []
human_review:
  - id: review-memory-desktop-client-local-swift
    covers:
      - swift-decodes-memory-contracts
      - memory-store-loads-workbench-state
    criterion: "On a macOS/Xcode-capable machine, verify desktop response decoding and MemoryStore state handling for legacy and extended memories, candidates, evidence, usage, analytics, and candidate events."
    reason: "Autopod-self required facts run in a Linux pod, while desktop Swift tests require a macOS/Xcode-capable environment."
