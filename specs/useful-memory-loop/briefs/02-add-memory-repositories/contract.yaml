contract_version: 1
title: "Add memory repositories"
depends_on:
  - 01-add-memory-contracts
scenarios:
  - id: extended-memory-crud
    given:
      - "approved legacy and extended memories exist"
    when:
      - "the memory repository lists, reads, searches, inserts, updates, approves, and deletes entries"
    then:
      - "legacy fields and new metadata are preserved"
      - "existing memory_search keyword behavior still works"
  - id: candidate-approval-versioning
    given:
      - "a pending daemon-curated candidate overlaps an existing approved memory"
    when:
      - "the human approves it as an update candidate"
    then:
      - "the target memory content and metadata are updated"
      - "the target memory version increments"
      - "no duplicate active memory is created"
  - id: usage-events-persist
    given:
      - "a pod has selected or interacted with memories"
    when:
      - "the daemon records usage events"
    then:
      - "selected, injected, read, searched, plan_reported, summary_reported, and not_reported rows can be queried"
required_facts:
  - id: fact-memory-repositories
    proves:
      - extended-memory-crud
      - candidate-approval-versioning
      - usage-events-persist
    kind: integration-test
    artifact:
      path: packages/daemon/src/pods/memory-repository.test.ts
      change: create
    command: npx pnpm --filter @autopod/daemon test -- memory-repository
human_review: []
