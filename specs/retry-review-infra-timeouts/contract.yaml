contract_version: 1
title: "Retry review infrastructure timeouts"
depends_on: []
scenarios:
  - id: retry-review-infra-recovers
    given:
      - "a pod is validating after the agent completed its work"
      - "build, test, lint, SAST, smoke, and required facts are passing or skipped according to profile configuration"
      - "the daemon AI task review fails with a retryable infrastructure timeout"
    when:
      - "the daemon handles the validation result"
      - "a later retry of the same validation review succeeds"
    then:
      - "the daemon retries validation review using the configured backoff policy"
      - "the agent is not resumed with correction feedback for the infrastructure failure"
      - "the pod continues through the normal successful validation path"
  - id: retry-review-infra-exhausted
    given:
      - "a pod is validating after the agent completed its work"
      - "all deterministic validation gates are passing"
      - "the daemon AI task review keeps failing with retryable infrastructure failures"
    when:
      - "the 3 retry budget is exhausted"
    then:
      - "the pod moves to review_required"
      - "the pod does not move to awaiting_input"
      - "the pod does not create a report_blocker pending escalation"
      - "the agent is not resumed with correction feedback"
  - id: ordinary-validation-failures-unchanged
    given:
      - "a validation result fails because of build, test, lint, SAST, smoke, or required-fact output"
    when:
      - "the daemon handles the failed validation result"
    then:
      - "the existing correction feedback or review_required behavior is preserved"
      - "the review-infrastructure retry path is not used"
  - id: feedback-does-not-request-agent-blocker
    given:
      - "validation feedback is formatted for a review execution failure"
    when:
      - "the feedback text is sent to the agent or stored as the last correction message"
    then:
      - "the feedback identifies the review infrastructure failure"
      - "the feedback does not instruct the agent to call report_blocker"
required_facts:
  - id: fact-retry-review-infra-recovers
    proves:
      - retry-review-infra-recovers
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/pod-manager.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- pod-manager.test.ts -t "retries review infrastructure failures without agent rework"
  - id: fact-retry-review-infra-exhausted
    proves:
      - retry-review-infra-exhausted
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/pod-manager.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- pod-manager.test.ts -t "moves to review_required after review infrastructure retries exhaust"
  - id: fact-ordinary-failures-unchanged
    proves:
      - ordinary-validation-failures-unchanged
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/pod-manager.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- pod-manager.test.ts -t "keeps ordinary validation failures on correction feedback path"
  - id: fact-review-infra-classification
    proves:
      - retry-review-infra-recovers
      - retry-review-infra-exhausted
      - ordinary-validation-failures-unchanged
    kind: unit-test
    artifact:
      path: packages/daemon/src/validation/local-validation-engine.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- local-validation-engine.test.ts
  - id: fact-feedback-does-not-request-blocker
    proves:
      - feedback-does-not-request-agent-blocker
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/feedback-formatter.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- feedback-formatter.test.ts
human_review: []
