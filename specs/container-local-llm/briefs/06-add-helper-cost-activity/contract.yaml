contract_version: 1
title: "Add helper cost and fallback visibility"
depends_on: [03-route-pr-metadata-helpers, 04-standardize-existing-helpers, 05-preserve-validation-review]
scenarios:
  - id: helper-cost-segment
    given:
      - "a pod records helper token usage"
    when:
      - "cost aggregation and cost breakdown are computed"
    then:
      - "helper appears as a known harness phase and Helper cost segment"
  - id: helper-token-accumulation
    given:
      - "multiple helper calls return token usage"
    when:
      - "the pod manager records phase token usage"
    then:
      - "helper usage accumulates under phaseTokenUsage.helper without trampling validation/advisory buckets"
  - id: final-fallback-activity-only
    given:
      - "live-container and helper-container stages fail before a final fallback is used"
    when:
      - "the daemon records helper fallback information"
    then:
      - "pod activity is emitted only for the final deterministic/template fallback"
required_facts:
  - id: fact-helper-cost-segment
    proves: [helper-cost-segment]
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/cost-aggregation.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- cost-aggregation.test.ts -t "helper"
  - id: fact-helper-token-accumulation
    proves: [helper-token-accumulation]
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/pod-manager.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- pod-manager.test.ts -t "helper token"
  - id: fact-final-fallback-activity-only
    proves: [final-fallback-activity-only]
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/pod-manager.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- pod-manager.test.ts -t "final fallback activity"
human_review: []
