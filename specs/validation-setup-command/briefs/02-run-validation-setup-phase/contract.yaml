contract_version: 1
title: "Run validation setup as the first daemon phase"
depends_on: [01-add-validation-setup-profile-contract]
scenarios:
  - id: setup-runs-before-downstream
    given:
      - "a profile has validationSetupCommand plus lint, SAST, build, and test commands"
    when:
      - "daemon local validation runs"
    then:
      - "setup executes before every downstream validation phase"
  - id: setup-failure-stops-downstream
    given:
      - "validationSetupCommand exits non-zero"
    when:
      - "daemon local validation runs"
    then:
      - "overall validation fails"
      - "lint, SAST, build, tests, health, pages, facts, and review are not executed"
      - "downstream phases are reported as skipped or not run"
  - id: setup-skipped-neutral
    given:
      - "validationSetupCommand is empty or setup is listed in skipValidationPhases"
    when:
      - "daemon local validation runs"
    then:
      - "setup is neutral and downstream phases continue normally"
  - id: setup-uses-build-timeout
    given:
      - "a profile configures buildTimeout"
    when:
      - "setup executes"
    then:
      - "the setup command uses the build timeout value"
  - id: setup-result-visible-to-failure-context
    given:
      - "setup fails with command output"
    when:
      - "validation events, summaries, and correction context are built"
    then:
      - "setup appears as the failed phase with its output before downstream failures"
required_facts:
  - id: fact-local-validation-setup-phase
    proves:
      - setup-runs-before-downstream
      - setup-failure-stops-downstream
      - setup-skipped-neutral
      - setup-uses-build-timeout
    kind: unit-test
    artifact:
      path: packages/daemon/src/validation/local-validation-engine.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- local-validation-engine.test.ts
  - id: fact-pod-manager-setup-summary
    proves: [setup-result-visible-to-failure-context]
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/pod-manager.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- pod-manager.test.ts
  - id: fact-setup-feedback-context
    proves: [setup-result-visible-to-failure-context]
    kind: unit-test
    artifact:
      path: packages/daemon/src/pods/correction-context.test.ts
      change: update
    command: npx pnpm --filter @autopod/daemon test -- correction-context.test.ts
human_review: []
