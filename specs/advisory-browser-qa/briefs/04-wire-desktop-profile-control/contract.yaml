contract_version: 1
title: "Wire desktop advisory browser QA profile control"
depends_on: [01-add-advisory-contracts]
scenarios:
  - id: desktop-profile-setting-visible
    given:
      - "a desktop user edits a base or derived profile"
    when:
      - "they view advisory browser QA settings"
    then:
      - "they can choose auto/inherit, enabled, or disabled without clobbering inherited defaults"
required_facts: []
human_review:
  - id: review-desktop-profile-control-local-swift
    covers:
      - desktop-profile-setting-visible
    criterion: "On a macOS/Xcode-capable machine, verify desktop profile decode and patch mapping so advisory browser QA can be set to auto/inherit, enabled, or disabled without clobbering inherited defaults."
    reason: "Autopod-self required facts run in a Linux pod, while desktop Swift tests require a macOS/Xcode-capable environment."
