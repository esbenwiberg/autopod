name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Non-blocking: pnpm 9.15's `audit` POSTs to npm's `/-/npm/v1/security/audits`
      # endpoint, which npm retired (HTTP 410, "use the bulk advisory endpoint").
      # That makes the step fail on every run regardless of the dependency tree, so
      # it must not gate merges. Findings still surface in the step log. Durable fix:
      # upgrade pnpm to a version that uses the bulk advisories endpoint, then drop
      # `continue-on-error`.
      - name: Dependency audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
