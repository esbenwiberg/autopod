<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main shape gradient: light blue top-left → purple bottom-right -->
    <linearGradient id="shape-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BA4D4"/>
      <stop offset="45%" stop-color="#6B7FC4"/>
      <stop offset="100%" stop-color="#5B4BA8"/>
    </linearGradient>
    <!-- Darker back face for 3D depth -->
    <linearGradient id="shadow-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4A5A8A"/>
      <stop offset="100%" stop-color="#3A2D6E"/>
    </linearGradient>
    <!-- Highlight for glossy shine -->
    <linearGradient id="shine" x1="0.2" y1="0" x2="0.6" y2="0.7">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow for the bright origin node -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF7CC"/>
      <stop offset="40%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#D4A030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Back face / shadow layer — gives 3D depth -->
  <path d="M160 60
           C130 60 100 80 90 110
           L50 340
           C40 370 55 405 85 420
           L280 460
           C310 472 345 460 360 435
           L480 170
           C495 140 480 105 450 90
           Z"
        fill="url(#shadow-grad)" opacity="0.6"/>

  <!-- Main rounded triangle play-button shape -->
  <path d="M175 72
           C145 65 112 82 100 112
           L55 320
           C42 352 58 388 88 402
           L285 448
           C315 460 350 446 364 418
           L470 165
           C484 135 470 98 440 85
           Z"
        fill="url(#shape-grad)"/>

  <!-- Glossy highlight overlay -->
  <path d="M175 72
           C145 65 112 82 100 112
           L70 270
           C130 260 220 200 320 170
           L440 85
           C430 80 200 68 175 72Z"
        fill="url(#shine)"/>

  <!-- Circuit network lines -->
  <g stroke="#C8D8F0" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85">
    <!-- Origin node down to center hub -->
    <line x1="185" y1="155" x2="245" y2="260"/>
    <!-- Center hub to right node -->
    <line x1="245" y1="260" x2="370" y2="240"/>
    <!-- Center hub down to bottom node -->
    <line x1="245" y1="260" x2="220" y2="380"/>
    <!-- Center hub to upper-right node -->
    <line x1="245" y1="260" x2="340" y2="340"/>
  </g>

  <!-- Circuit nodes -->
  <g>
    <!-- Origin node — bright glow -->
    <circle cx="185" cy="155" r="26" fill="url(#node-glow)"/>
    <circle cx="185" cy="155" r="13" fill="#FFEEBB"/>
    <circle cx="185" cy="155" r="7" fill="white"/>

    <!-- Center hub node -->
    <circle cx="245" cy="260" r="14" fill="#D0DDEF"/>
    <circle cx="245" cy="260" r="8" fill="white"/>

    <!-- Right node -->
    <circle cx="370" cy="240" r="11" fill="#C0CCE0"/>
    <circle cx="370" cy="240" r="6" fill="white"/>

    <!-- Bottom node -->
    <circle cx="220" cy="380" r="11" fill="#B8C4D8"/>
    <circle cx="220" cy="380" r="6" fill="white"/>

    <!-- Lower-right node -->
    <circle cx="340" cy="340" r="10" fill="#B0BCD0"/>
    <circle cx="340" cy="340" r="5.5" fill="white"/>
  </g>
</svg>
